<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="input.css">
  <title>Text Input Component</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    body {
      font-family: system-ui, sans-serif;
      background: #f8f8f8;
      margin: 0;
      padding: 32px;
      color: #27252d;
    }

    h1 { font-size: 24px; font-weight: 700; margin: 0 0 4px; }
    .subtitle { color: #737373; font-size: 14px; margin: 0 0 40px; }
    section { margin-bottom: 40px; }
    h2 {
      font-size: 13px; font-weight: 600; text-transform: uppercase;
      letter-spacing: 0.08em; color: #A0A0A0; margin: 0 0 16px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 24px;
    }

    /* Demo dark wrapper — styling only, not component styles */
    .dark-demo {
      background: var(--color-navy-70);
      border-radius: 12px;
      padding: 24px;
    }
    .dark-demo h2 { color: rgba(255, 255, 255, 0.4); }
  </style>
</head>
<body>

  <h1>Text Input</h1>
  <p class="subtitle">All states — Zego Design System</p>

  <!-- ============================================================
       STATES
  ============================================================ -->
  <section>
    <h2>States</h2>
    <div class="grid">

      <!-- Default (with value) -->
      <div class="input-group">
        <label class="input-label">Default</label>
        <div class="input-field">
          <input class="input" type="text" value="Input value">
          <span class="input-icon">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
              <circle cx="8" cy="8" r="7" stroke="currentColor" stroke-width="1.5"/>
              <path d="M5.5 5.5l5 5M10.5 5.5l-5 5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            </svg>
          </span>
        </div>
      </div>

      <!-- Placeholder -->
      <div class="input-group">
        <label class="input-label">Placeholder</label>
        <div class="input-field">
          <input class="input" type="text" placeholder="Placeholder text">
        </div>
      </div>

      <!-- Hover (simulated with inline style for demo only) -->
      <div class="input-group">
        <label class="input-label">Hover</label>
        <div class="input-field" style="border-color: var(--color-border-secondary)">
          <input class="input" type="text" value="Input value">
        </div>
      </div>

      <!-- Focused (simulated with inline style for demo only) -->
      <div class="input-group">
        <label class="input-label">Focused</label>
        <div class="input-field" style="border-color: var(--color-border-focused); box-shadow: var(--shadow-focus)">
          <input class="input" type="text" value="Input value">
        </div>
      </div>

      <!-- Error -->
      <div class="input-group">
        <label class="input-label">Error</label>
        <div class="input-field input-field--error">
          <input class="input" type="text" value="Input value">
          <span class="input-icon">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
              <circle cx="8" cy="8" r="7" fill="currentColor"/>
              <path d="M8 5v3.5M8 10.5v.5" stroke="#fff" stroke-width="1.5" stroke-linecap="round"/>
            </svg>
          </span>
        </div>
        <div class="input-message input-message--error">
          <svg class="input-message__icon" viewBox="0 0 24 24" fill="none">
            <circle cx="12" cy="12" r="10" stroke="#e21313" stroke-width="1.5"/>
            <path d="M12 8v5M12 15.5v.5" stroke="#e21313" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
          This field has an error
        </div>
      </div>

      <!-- Valid -->
      <div class="input-group">
        <label class="input-label">Valid</label>
        <div class="input-field input-field--valid">
          <input class="input" type="text" value="Input value">
          <span class="input-icon">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
              <circle cx="8" cy="8" r="7" fill="currentColor"/>
              <path d="M5 8l2 2 4-4" stroke="#fff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </span>
        </div>
        <div class="input-message input-message--valid">Valid message</div>
      </div>

      <!-- Hint -->
      <div class="input-group">
        <label class="input-label">Hint</label>
        <div class="input-field">
          <input class="input" type="text" value="Input value">
        </div>
        <div class="input-message input-message--hint">This is a hint message</div>
      </div>

      <!-- Disabled -->
      <div class="input-group">
        <label class="input-label">Disabled</label>
        <div class="input-field input-field--disabled">
          <input class="input" type="text" disabled value="Input value">
        </div>
      </div>

    </div>
  </section>

  <!-- ============================================================
       DARK MODE
  ============================================================ -->
  <section>
    <h2>Dark Mode</h2>
    <div class="dark-demo" data-theme="dark">
      <h2>On dark background</h2>
      <div class="grid">

        <div class="input-group">
          <label class="input-label">Default</label>
          <div class="input-field">
            <input class="input" type="text" value="Input value">
          </div>
        </div>

        <div class="input-group">
          <label class="input-label">Placeholder</label>
          <div class="input-field">
            <input class="input" type="text" placeholder="Placeholder text">
          </div>
        </div>

        <div class="input-group">
          <label class="input-label">Focused</label>
          <div class="input-field" style="border-color: var(--color-border-focused); box-shadow: var(--shadow-focus)">
            <input class="input" type="text" value="Input value">
          </div>
        </div>

      </div>
    </div>
  </section>

</body>
</html>
